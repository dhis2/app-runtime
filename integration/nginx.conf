server {
    listen 80;

    # Restrict per-buffer URI limit so requests with query strings longer than
    # 1024 bytes trigger HTTP 414. This lets tests exercise the query-alias
    # fallback without needing a specially configured remote DHIS2 instance.
    large_client_header_buffers 4 1k;

    location / {
        proxy_pass         http://dhis2:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 300s;
    }
}
