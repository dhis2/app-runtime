services:
    db:
        image: postgis/postgis:13-3.4-alpine
        environment:
            POSTGRES_DB: ${DB_NAME:-dhis2}
            POSTGRES_USER: ${DB_USERNAME:-dhis}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-dhis}
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${DB_USERNAME:-dhis} -d ${DB_NAME:-dhis2}',
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    dhis2:
        image: dhis2/core:2.43
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./dhis.conf:/opt/dhis2/dhis.conf:ro
        environment:
            DB_HOSTNAME: db
            DB_NAME: ${DB_NAME:-dhis2}
            DB_USERNAME: ${DB_USERNAME:-dhis}
            DB_PASSWORD: ${DB_PASSWORD:-dhis}
        expose:
            - '8080'

    proxy:
        image: nginx:1.27-alpine
        depends_on:
            - dhis2
        ports:
            - '${DHIS2_HTTP_PORT:-18080}:80'
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
