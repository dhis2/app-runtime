name: 'dhis2: verify (lib)'

on:
    push:
    pull_request:
        types: ['opened', 'edited', 'reopened', 'synchronize']
    workflow_dispatch:

env:
    GIT_AUTHOR_NAME: '@dhis2-bot'
    GIT_AUTHOR_EMAIL: 'apps@dhis2.org'
    GIT_COMMITTER_NAME: '@dhis2-bot'
    GIT_COMMITTER_EMAIL: 'apps@dhis2.org'
    NPM_TOKEN: ${{secrets.DHIS2_BOT_NPM_TOKEN}}
    GH_TOKEN: ${{secrets.DHIS2_BOT_GITHUB_TOKEN}}
    CI: true

jobs:
    install:
        runs-on: ubuntu-latest
        if: "!contains(github.event.head_commit.message, '[skip ci]')"

        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x

            - uses: actions/cache@v4
              id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

            - name: Install
              if: steps.yarn-cache.outputs.cache-hit != 'true'
              run: |
                  yarn install --frozen-lockfile
                  yarn install:examples

    build:
        runs-on: ubuntu-latest
        needs: install
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x

            - uses: actions/cache@v4
              id: yarn-cache
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

            - name: Build
              run: yarn build

            - uses: actions/upload-artifact@v4
              with:
                  name: lib-build
                  path: |
                      **/build
                      !**/node_modules
                  retention-days: 1

    lint:
        runs-on: ubuntu-latest
        needs: [install, build]
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x

            - uses: actions/cache@v4
              id: yarn-cache
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

            - uses: actions/download-artifact@v4
              with:
                  name: lib-build

            - name: Generate i18n
              working-directory: ./examples/query-playground
              run: yarn d2-app-scripts i18n generate

            - name: Lint
              run: yarn lint

    test:
        runs-on: ubuntu-latest
        needs: [install, build]
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
            - uses: actions/cache@v4
              id: yarn-cache
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

            - uses: actions/download-artifact@v4
              with:
                  name: lib-build

            - name: Test
              run: yarn test

    integration-test:
        runs-on: ubuntu-latest
        needs: [build]
        if: "github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]'))"
        timeout-minutes: 25

        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x

            - uses: actions/cache@v4
              id: yarn-cache
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

            - uses: actions/download-artifact@v4
              with:
                  name: lib-build

            - name: Install integration dependencies
              run: yarn --cwd integration install --frozen-lockfile

            - name: Start DHIS2 stack
              working-directory: ./integration
              run: docker compose up -d

            - name: Run integration tests
              run: yarn test:integration
              env:
                  DHIS2_BASE_URL: http://localhost:18080
                  DHIS2_USERNAME: admin
                  DHIS2_PASSWORD: district
                  DHIS2_API_VERSION: 43

            - name: Stop DHIS2 stack
              if: always()
              working-directory: ./integration
              run: docker compose down -v

    notify-integration:
        runs-on: ubuntu-latest
        needs: [integration-test]
        if: "always() && needs.integration-test.result != 'skipped' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master')"
        steps:
            - uses: rtCamp/action-slack-notify@v2
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_BACKEND_WEBHOOK }}
                  SLACK_CHANNEL: 'team-extensibility-notifications'
                  SLACK_TITLE: 'Integration tests (${{ needs.integration-test.result }}) — DHIS2 2.43'
                  SLACK_MESSAGE: "${{ github.event_name == 'pull_request' && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || github.ref_name }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  SLACK_COLOR: ${{ needs.integration-test.result }}

    publish:
        runs-on: ubuntu-latest
        needs: [build, lint, test]
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        steps:
            - uses: actions/checkout@v2
              with:
                  token: ${{env.GH_TOKEN}}

            - uses: dhis2/action-commit-signing@v1
              with:
                  ssh-signing-key: ${{ secrets.DHIS2_BOT_SSH_SIGNING_KEY }}
                  ssh-signing-key-passphrase: ${{ secrets.DHIS2_BOT_SSH_SIGNING_PASSPHRASE }}

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x

            - uses: actions/download-artifact@v4
              with:
                  name: lib-build

            - name: Publish to NPM
              run: npx @dhis2/cli-utils release --publish npm
